<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Cams</title>
  <meta name="description" content="Browse top live cam rooms. Click any room to watch live." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#0a0e1a" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: #10162a;
      --surface2: #161e35;
      --border: #1e2d52;
      --blue: #3b6bdb;
      --blue-light: #5885f0;
      --blue-dim: #243a7a;
      --text: #dce4f7;
      --text-muted: #7a8fb5;
      --text-dim: #4a5b85;
      --live: #e74c3c;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* HEADER */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 14, 26, 0.92);
      backdrop-filter: blur(12px);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      gap: 16px;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--blue-light);
      letter-spacing: -0.4px;
      text-decoration: none;
    }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--live);
      letter-spacing: 0.5px;
    }
    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--live);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }
    .room-count {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* MAIN */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* SECTION HEADER */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 14px;
    }

    /* TAGS */
    .tags-section {
      margin-bottom: 32px;
    }
    .tags-scroll {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag {
      display: inline-block;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      background: var(--surface);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      cursor: pointer;
      white-space: nowrap;
    }
    .tag:hover {
      border-color: var(--blue);
      color: var(--blue-light);
      background: var(--blue-dim);
    }
    .tag.active {
      border-color: var(--blue);
      color: var(--blue-light);
      background: var(--blue-dim);
    }

    /* GRID */
    .rooms-section { }
    .rooms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    /* ROOM CARD */
    .room-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s, transform 0.15s;
      position: relative;
    }
    .room-card:hover {
      border-color: var(--blue);
      transform: translateY(-2px);
    }

    .thumb-wrap {
      position: relative;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: var(--surface2);
      cursor: pointer;
    }
    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.2s;
    }
    .room-card:hover .thumb-wrap img {
      transform: scale(1.03);
    }

    .play-btn {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 14, 26, 0.45);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .thumb-wrap:hover .play-btn {
      opacity: 1;
    }
    .play-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(59, 107, 219, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .play-icon svg {
      width: 18px;
      height: 18px;
      fill: #fff;
      margin-left: 2px;
    }

    .card-rank {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(10, 14, 26, 0.82);
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }

    .card-viewers {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(231, 76, 60, 0.88);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* EMBED */
    .embed-wrap {
      position: relative;
      aspect-ratio: 16/9;
      background: #000;
    }
    .embed-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .close-embed {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(10, 14, 26, 0.85);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 4px;
      width: 26px;
      height: 26px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      transition: color 0.1s;
    }
    .close-embed:hover { color: var(--text); }

    /* CARD INFO */
    .card-info {
      padding: 10px 12px 12px;
    }
    .card-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .card-name:hover { color: var(--blue-light); }
    .card-subject {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .card-tag {
      font-size: 10px;
      color: var(--text-dim);
      padding: 2px 7px;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      background: var(--surface2);
      transition: color 0.1s, border-color 0.1s;
      cursor: pointer;
    }
    .card-tag:hover {
      color: var(--blue-light);
      border-color: var(--blue-dim);
    }

    /* LOADING / EMPTY */
    .state-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 320px;
      gap: 16px;
      color: var(--text-muted);
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: var(--live);
      font-size: 14px;
      text-align: center;
    }

    /* FILTER BAR */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-bar .section-label { margin-bottom: 0; }
    .active-filter {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--blue-dim);
      border: 1px solid var(--blue);
      border-radius: 20px;
      font-size: 12px;
      color: var(--blue-light);
    }
    .clear-filter {
      background: none;
      border: none;
      color: var(--blue-light);
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      line-height: 1;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .rooms-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
      main { padding: 16px 12px 48px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="?">LiveCams</a>
    <span class="live-badge"><span class="live-dot"></span>LIVE</span>
    <span class="room-count" id="room-count"></span>
  </div>
</header>

<main>
  <!-- TAGS -->
  <section class="tags-section" id="tags-section">
    <div class="section-label">Top Tags</div>
    <div class="tags-scroll" id="tags-container">
      <div class="spinner" style="width:20px;height:20px;border-width:2px;"></div>
    </div>
  </section>

  <!-- ROOMS -->
  <section class="rooms-section">
    <div class="filter-bar">
      <div class="section-label" id="rooms-label">Top Rooms</div>
      <div id="active-filter-display"></div>
    </div>
    <div id="rooms-container">
      <div class="state-container"><div class="spinner"></div><span>Loading rooms…</span></div>
    </div>
  </section>
</main>

<footer>
  All streams are provided by Chaturbate. 18+ only. <a href="https://chaturbate.com/?wm=T2CSW" target="_blank" rel="noopener" style="color:var(--blue-light);text-decoration:none;">Join free</a>.
</footer>

<script>
  const WM = 'T2CSW';
  const API_URL = `https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=${WM}&client_ip=request_ip&limit=100&offset=0`;
  const ROOM_LINK = (slug) => `https://chaturbate.com/${slug}/?wm=${WM}`;
  const EMBED_URL  = (slug) => `https://chaturbate.com/in/?tour=OQue&bgcolor=black&campaign=T2CSW&disable_sound=0&room=${slug}`;

  let allRooms = [];
  let activeTag = null;
  let activeEmbedSlug = null;

  // ── FETCH ──────────────────────────────────────────────────────────────────
  async function fetchRooms() {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    return data.results || data.objects || (Array.isArray(data) ? data : []);
  }

  // ── TAG COUNTS ─────────────────────────────────────────────────────────────
  function buildTagCounts(rooms) {
    const counts = {};
    for (const r of rooms) {
      const tags = r.tags || r.subject_tags || [];
      for (const t of tags) {
        const tag = typeof t === 'string' ? t : t.name || t.tag;
        if (tag) counts[tag] = (counts[tag] || 0) + 1;
      }
    }
    return Object.entries(counts)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 100)
      .map(([tag]) => tag);
  }

  // ── RENDER TAGS ────────────────────────────────────────────────────────────
  function renderTags(tags) {
    const container = document.getElementById('tags-container');
    if (!tags.length) { container.innerHTML = '<span style="color:var(--text-dim);font-size:12px;">No tags found</span>'; return; }
    container.innerHTML = tags.map(t => `
      <button class="tag${activeTag === t ? ' active' : ''}" data-tag="${escHtml(t)}">#${escHtml(t)}</button>
    `).join('');
    container.querySelectorAll('.tag').forEach(btn => {
      btn.addEventListener('click', () => {
        const tag = btn.dataset.tag;
        if (activeTag === tag) { activeTag = null; } else { activeTag = tag; }
        activeEmbedSlug = null;
        renderTags(tags);
        renderRooms(filteredRooms());
        updateFilterDisplay();
      });
    });
  }

  // ── FILTER ─────────────────────────────────────────────────────────────────
  function filteredRooms() {
    if (!activeTag) return allRooms;
    return allRooms.filter(r => {
      const tags = r.tags || r.subject_tags || [];
      return tags.some(t => {
        const name = typeof t === 'string' ? t : t.name || t.tag || '';
        return name === activeTag;
      });
    });
  }

  function updateFilterDisplay() {
    const el = document.getElementById('active-filter-display');
    const label = document.getElementById('rooms-label');
    if (activeTag) {
      label.textContent = `Rooms tagged`;
      el.innerHTML = `<span class="active-filter">#${escHtml(activeTag)}<button class="clear-filter" title="Clear filter">×</button></span>`;
      el.querySelector('.clear-filter').addEventListener('click', () => {
        activeTag = null;
        activeEmbedSlug = null;
        renderTags(buildTagCounts(allRooms));
        renderRooms(filteredRooms());
        updateFilterDisplay();
      });
    } else {
      label.textContent = 'Top Rooms';
      el.innerHTML = '';
    }
  }

  // ── RENDER ROOMS ───────────────────────────────────────────────────────────
  function renderRooms(rooms) {
    const container = document.getElementById('rooms-container');
    document.getElementById('room-count').textContent = `${rooms.length} live`;

    if (!rooms.length) {
      container.innerHTML = '<div class="state-container"><span>No rooms found for this tag.</span></div>';
      return;
    }

    container.innerHTML = `<div class="rooms-grid">${rooms.map((r, i) => roomCard(r, i + 1)).join('')}</div>`;

    // thumb click → embed
    container.querySelectorAll('.thumb-wrap').forEach(wrap => {
      wrap.addEventListener('click', () => toggleEmbed(wrap.dataset.slug));
    });

    // card tag click
    container.querySelectorAll('.card-tag').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        const tag = btn.dataset.tag;
        activeTag = activeTag === tag ? null : tag;
        activeEmbedSlug = null;
        renderTags(buildTagCounts(allRooms));
        renderRooms(filteredRooms());
        updateFilterDisplay();
      });
    });
  }

  function toggleEmbed(slug) {
    if (activeEmbedSlug === slug) {
      activeEmbedSlug = null;
    } else {
      activeEmbedSlug = slug;
    }
    // re-render; TODO could do in-place for perf
    renderRooms(filteredRooms());
    if (activeEmbedSlug) {
      const card = document.querySelector(`.room-card[data-slug="${CSS.escape(slug)}"]`);
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  function roomCard(r, rank) {
    const slug = r.username || r.room_slug || r.slug || '';
    const subject = escHtml(r.subject || r.topic || '');
    const viewers = r.num_users || r.viewers || 0;
    const img = r.current_show_images?.medium || r.image_url || r.image || r.preview_url || '';
    const tags = (r.tags || r.subject_tags || []).slice(0, 5).map(t => {
      const name = typeof t === 'string' ? t : t.name || t.tag || '';
      return name ? `<button class="card-tag" data-tag="${escHtml(name)}">#${escHtml(name)}</button>` : '';
    }).join('');

    const isEmbedded = activeEmbedSlug === slug;

    const mediaArea = isEmbedded
      ? `<div class="embed-wrap">
           <button class="close-embed" data-slug="${escHtml(slug)}" title="Close">✕</button>
           <iframe src="${EMBED_URL(slug)}" allowfullscreen scrolling="no" allow="autoplay"></iframe>
         </div>`
      : `<div class="thumb-wrap" data-slug="${escHtml(slug)}">
           ${img ? `<img src="${escHtml(img)}" alt="${escHtml(slug)}" loading="lazy" />` : ''}
           <div class="play-btn">
             <div class="play-icon">
               <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
             </div>
           </div>
           <span class="card-rank">#${rank}</span>
           ${viewers ? `<span class="card-viewers"><span class="live-dot"></span>${fmtNum(viewers)}</span>` : ''}
         </div>`;

    return `<div class="room-card" data-slug="${escHtml(slug)}">
      ${mediaArea}
      <div class="card-info">
        <a class="card-name" href="${ROOM_LINK(slug)}" target="_blank" rel="noopener noreferrer">${escHtml(slug)}</a>
        ${subject ? `<div class="card-subject" title="${subject}">${subject}</div>` : ''}
        ${tags ? `<div class="card-tags">${tags}</div>` : ''}
      </div>
    </div>`;
  }

  // ── UTILS ──────────────────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtNum(n) {
    return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n);
  }

  // Close embed button events (delegated)
  document.addEventListener('click', e => {
    if (e.target.closest('.close-embed')) {
      const slug = e.target.closest('.close-embed').dataset.slug;
      if (activeEmbedSlug === slug) {
        activeEmbedSlug = null;
        renderRooms(filteredRooms());
      }
    }
  });

  // ── INIT ───────────────────────────────────────────────────────────────────
  (async function init() {
    try {
      allRooms = await fetchRooms();
      if (!allRooms.length) throw new Error('Empty response');
      const tags = buildTagCounts(allRooms);
      renderTags(tags);
      renderRooms(allRooms);
    } catch (err) {
      document.getElementById('tags-container').innerHTML = '';
      document.getElementById('rooms-container').innerHTML =
        `<div class="state-container">
           <span class="error-msg">Could not load rooms.<br>${escHtml(err.message)}</span>
           <button onclick="location.reload()" style="margin-top:8px;padding:8px 20px;background:var(--blue);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;">Retry</button>
         </div>`;
      document.getElementById('room-count').textContent = 'offline';
    }
  })();
</script>
</body>
</html>
